services:
  - type: web
    name: rail-drishti
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    envVars:
      - key: RAILWAYS_DATA_DIR
        value: /app/data
      - key: PYTHONPATH
        value: /app
    healthCheckPath: /health
    # Render free tier has 512MB RAM — startup takes ~2 min loading large JSONs
    # The health check retries handle this gracefully
